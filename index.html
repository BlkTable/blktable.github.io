<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BLKTable</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<style>
  :root {
    --bg: #0a0b0d;
    --bg-top: #16181c;
    --card: #131519;
    --text: #f2f3f5;
    --muted: #8b9198;
    --silver: #d6dade;
    --silver-hi: #eef0f2;
    --silver-lo: #b4b9c0;
    --line: rgba(255,255,255,0.08);
    --field-bg: #0e1013;
    --field-border: #2a2e34;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--silver); }
  ::placeholder { color: #5f656d; }

  /* ---------- Login ---------- */
  .login-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: radial-gradient(1200px 600px at 50% -10%, var(--bg-top) 0%, var(--bg) 55%);
  }
  .login { width: 100%; max-width: 372px; }
  .brand-logo {
    display: block; width: 240px; max-width: 82%; height: auto;
    margin: 0 auto 24px;
  }
  .login-card {
    background: linear-gradient(180deg, #16181d 0%, var(--card) 100%);
    border: 1px solid var(--line); border-radius: 18px;
    padding: 26px 24px 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .brand-sub { text-align: center; color: var(--muted); font-size: 0.82rem; margin: 0 0 20px; }
  .field-group { display: flex; flex-direction: column; gap: 12px; }
  input {
    padding: 13px 15px; border-radius: 12px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 1rem; outline: none; width: 100%;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus { border-color: var(--silver); box-shadow: 0 0 0 3px rgba(214,218,222,0.12); }
  button.primary {
    padding: 13px 16px; border-radius: 12px; border: none;
    background: linear-gradient(180deg, var(--silver-hi) 0%, var(--silver-lo) 100%);
    color: #14161a; font-weight: 700; font-size: 1rem; cursor: pointer;
    transition: filter 0.15s ease, transform 0.05s ease;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: 0.55; cursor: default; filter: none; }
  .msg { font-size: 0.85rem; text-align: center; min-height: 1.2em; margin-top: 4px; }
  .msg.err { color: #ff6b6b; }
  .msg.ok { color: #7ed08a; }

  /* ---------- App shell ---------- */
  .app { display: none; min-height: 100vh; flex-direction: column; }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 22px; border-bottom: 1px solid var(--line);
    background: rgba(14,16,19,0.82); backdrop-filter: blur(10px);
  }
  .topbar .logo-img { height: 38px; width: auto; display: block; }
  .topbar .right { display: flex; align-items: center; gap: 16px; }
  .who { text-align: right; line-height: 1.25; }
  .who .email { font-size: 0.85rem; color: var(--text); }
  .badge {
    display: inline-block; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; padding: 2px 9px; border-radius: 999px; margin-top: 2px;
    background: rgba(214,218,222,0.12); color: var(--silver); border: 1px solid rgba(214,218,222,0.34);
  }
  .linkbtn {
    background: none; border: 1px solid var(--field-border); color: var(--muted); font-size: 0.8rem;
    cursor: pointer; padding: 7px 12px; border-radius: 9px; transition: color 0.15s, border-color 0.15s;
  }
  .linkbtn:hover { color: var(--text); border-color: var(--silver); }
  .content { flex: 1; padding: 34px 22px 48px; max-width: 900px; width: 100%; margin: 0 auto; }

  /* ---------- Workspace: Tables sidebar + main pane ---------- */
  .workspace { display: flex; flex: 1; min-height: 0; }
  .sidebar { width: 232px; flex: 0 0 auto; border-right: 1px solid var(--line); background: #0e1013;
    padding: 22px 14px; display: flex; flex-direction: column; gap: 10px; }
  .side-bottom { margin-top: auto; }
  .side-label { font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 0 10px; margin-bottom: 6px; }
  .side-list { display: flex; flex-direction: column; gap: 4px; }
  .side-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 10px 12px; border-radius: 10px; background: none; border: none; color: var(--text);
    font-size: 0.9rem; cursor: pointer; font-family: inherit; }
  .side-item:hover { background: rgba(255,255,255,0.05); }
  .side-item.active { background: rgba(214,218,222,0.12); color: var(--silver); font-weight: 600; }
  .side-item .ico { width: 8px; height: 8px; border-radius: 2px; background: currentColor; opacity: 0.7; flex: 0 0 auto; }
  .main { flex: 1; min-width: 0; padding: 30px 26px 48px; max-width: 920px; }
  .view.hidden { display: none; }
  @media (max-width: 720px) {
    .workspace { flex-direction: column; }
    .sidebar { width: auto; border-right: none; border-bottom: 1px solid var(--line);
      flex-direction: row; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px 14px; }
    .side-group { display: flex; align-items: center; gap: 8px; }
    .side-bottom { margin-top: 0; margin-left: auto; }
    .side-label { display: none; }
    .side-list { flex-direction: row; flex-wrap: wrap; }
    .side-item { padding: 8px 12px; border: 1px solid var(--field-border); border-radius: 999px; }
    .main { padding: 22px 16px 40px; max-width: none; }
  }
  .section-title { font-size: 0.74rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .empty {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent),
      var(--card);
    border: 1px dashed var(--field-border); border-radius: 16px;
    padding: 48px 24px; text-align: center; color: var(--muted);
  }
  .empty h2 { color: var(--text); font-size: 1.05rem; margin: 0 0 8px; }
  .empty p { margin: 0; font-size: 0.9rem; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px; margin-top: 26px;
  }
  .card h3 { margin: 0 0 14px; font-size: 0.95rem; }
  .card .field-group { max-width: 340px; }
  .hidden { display: none !important; }

  /* ---------- Job Applications review ---------- */
  .ja-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
  .ja-title { margin: 2px 0 0; font-size: 1.3rem; font-weight: 800; }
  .ja-count { color: var(--muted); font-size: 0.82rem; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input[type="search"] { flex: 1; min-width: 150px; height: 44px; padding: 0 14px; border-radius: 11px;
    border: 1px solid var(--field-border); background: var(--field-bg); color: var(--text); font-size: 0.95rem; outline: none; color-scheme: dark; }
  .toolbar input[type="search"]:focus { border-color: var(--silver); }
  .toolbar select { width: auto; min-width: 150px; height: 44px; padding: 0 34px 0 14px; border-radius: 11px;
    border: 1px solid var(--field-border); background: var(--field-bg); color: var(--text); font-size: 0.95rem; outline: none;
    appearance: none; -webkit-appearance: none; cursor: pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
  .toolbar .linkbtn { height: 44px; }
  .ja-list { display: flex; flex-direction: column; gap: 10px; }
  .ja-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; cursor: pointer; transition: border-color 0.15s ease; }
  .ja-row:hover { border-color: var(--silver); }
  .ja-thumb { width: 46px; height: 46px; border-radius: 10px; object-fit: cover; flex: 0 0 auto;
    background: #20242b; display: flex; align-items: center; justify-content: center; color: var(--muted); font-weight: 700; font-size: 1.1rem; }
  .ja-row .info { flex: 1; min-width: 0; }
  .ja-row .name { font-weight: 600; font-size: 0.95rem; }
  .ja-row .sub { color: var(--muted); font-size: 0.8rem; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge-status { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 10px; border-radius: 999px; white-space: nowrap; flex: 0 0 auto; }
  .stars { display: inline-flex; gap: 3px; }
  .stars .star { color: #3a3f47; cursor: pointer; font-size: 1.3rem; line-height: 1; }
  .stars .star.on { color: var(--silver); }

  .seg { display: inline-flex; background: var(--field-bg); border: 1px solid var(--field-border);
    border-radius: 11px; padding: 3px; height: 44px; }
  .seg button { border: none; background: none; color: var(--muted); font-weight: 600; font-size: 0.85rem;
    padding: 0 14px; border-radius: 8px; cursor: pointer; font-family: inherit; }
  .seg button.active { background: rgba(214,218,222,0.14); color: var(--silver); }

  .filter-wrap { position: relative; }
  .filter-btn { height: 44px; width: 44px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 11px; border: 1px solid var(--field-border); background: var(--field-bg); color: var(--muted); cursor: pointer; }
  .filter-btn:hover { border-color: var(--silver); color: var(--text); }
  .filter-btn.active { border-color: var(--silver); color: var(--silver); }
  .filter-panel { position: absolute; top: calc(100% + 6px); right: 0; z-index: 30; width: 244px;
    background: #1a1d22; border: 1px solid var(--field-border); border-radius: 12px; padding: 14px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.5); display: none; }
  .filter-panel.open { display: block; }
  .fp-group { margin-bottom: 14px; }
  .fp-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 8px; }
  #fp-gender { display: flex; width: 100%; height: 40px; }
  #fp-gender button { flex: 1; padding: 0; }
  #fp-country { display: flex; width: 100%; height: 40px; }
  #fp-country button { flex: 1; padding: 0; font-size: 0.78rem; }
  .mini-flag { width: 16px; height: 11px; object-fit: cover; border-radius: 2px; display: inline-block; vertical-align: -1px; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }
  .fp-select { width: 100%; height: 40px; padding: 0 34px 0 12px; border-radius: 9px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 0.9rem; outline: none; appearance: none; -webkit-appearance: none;
    cursor: pointer; color-scheme: dark; font-family: inherit;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
  .fp-select:focus { border-color: var(--silver); }
  .fp-age { display: flex; align-items: center; gap: 8px; }
  .fp-age input { width: 100%; height: 40px; padding: 0 10px; border-radius: 9px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 0.9rem; outline: none; color-scheme: dark; font-family: inherit; }
  .fp-age input:focus { border-color: var(--silver); }
  .fp-age span { color: var(--muted); }
  .fp-clear { width: 100%; padding: 9px; border-radius: 9px; border: 1px solid var(--field-border);
    background: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; }
  .fp-clear:hover { color: var(--text); border-color: var(--silver); }

  .ja-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .ja-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s ease; }
  .ja-card:hover { border-color: var(--silver); }
  .ja-card .photo { width: 100%; aspect-ratio: 1 / 1; background: #20242b center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; font-weight: 700; }
  .ja-card .body { padding: 12px; text-align: center; }
  .ja-card .body .name { font-weight: 600; font-size: 0.95rem; }
  .ja-card .body .meta { color: var(--muted); font-size: 0.78rem; margin: 3px 0 8px; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .card-actions button { flex: 1; padding: 8px 0; border-radius: 9px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
  .btn-approve { background: #2fbf6b; color: #062916; }
  .btn-approve:hover { filter: brightness(1.07); }
  .btn-reject { background: #ff5a5a; color: #3a0808; }
  .btn-reject:hover { filter: brightness(1.07); }
  .btn-send { background: #25d366; color: #0a2e17; }
  .btn-send:hover { filter: brightness(1.07); }
  .btn-del { background: #ff5a5a; color: #3a0808; }
  .btn-del:hover { filter: brightness(1.07); }
  .card-actions .btn-restore { background: var(--field-bg); color: var(--text); border: 1px solid var(--field-border); }
  .card-actions .btn-restore:hover { border-color: var(--silver); }
  .tabs { margin-bottom: 16px; }
  .tab-count { font-size: 0.72rem; opacity: 0.7; margin-left: 3px; }
  .ja-bulk { margin-bottom: 14px; }
  .ja-bulk .btn-wa { width: auto; padding: 11px 18px; border-radius: 11px; }
  .card-when { font-size: 0.74rem; color: var(--silver); margin-top: 8px; }
  .card-sent { font-size: 0.72rem; color: #58c98a; margin-top: 4px; }
  #sched-dt, #sched-loc { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 0.95rem; outline: none; color-scheme: dark; font-family: inherit; }
  #sched-dt:focus, #sched-loc:focus { border-color: var(--silver); }
  .sched-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 7px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.62); backdrop-filter: blur(3px);
    display: none; align-items: flex-start; justify-content: center; padding: 24px 16px; z-index: 50; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { position: relative; width: 100%; max-width: 520px; background: var(--card);
    border: 1px solid var(--line); border-radius: 18px; padding: 24px; box-shadow: 0 30px 70px rgba(0,0,0,0.55); }
  .modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--muted); font-size: 1.15rem; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .m-photo { width: 96px; height: 96px; border-radius: 14px; object-fit: cover; background: #20242b; margin-bottom: 14px; }
  .m-name { font-size: 1.25rem; font-weight: 800; margin: 0; }
  .m-sub { color: var(--muted); font-size: 0.8rem; margin: 2px 0 16px; }
  .m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-bottom: 4px; }
  .m-field .k { color: var(--muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .m-field .v { font-size: 0.92rem; margin-top: 2px; word-break: break-word; }
  .m-field.full { grid-column: 1 / -1; }
  .m-section { border-top: 1px solid var(--line); padding-top: 16px; margin-top: 16px; }
  .m-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .m-row label { font-size: 0.8rem; color: var(--muted); width: 62px; flex: 0 0 auto; }
  .m-row select, .m-row textarea { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 0.92rem; outline: none; font-family: inherit; color-scheme: dark; }
  .m-row select:focus, .m-row textarea:focus { border-color: var(--silver); }
  .m-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-wa { flex: 1; padding: 12px; border-radius: 11px; border: none; background: #25d366; color: #0a2e17; font-weight: 700; cursor: pointer; font-size: 0.95rem; }
  .btn-wa:hover { filter: brightness(1.06); }
  .btn-save { padding: 12px 18px; border-radius: 11px; border: 1px solid var(--field-border); background: var(--field-bg); color: var(--text); cursor: pointer; font-weight: 600; }
  .btn-save:hover { border-color: var(--silver); }
  .m-msg { font-size: 0.8rem; color: var(--muted); margin-top: 10px; text-align: center; min-height: 1em; }
</style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="login-wrap">
    <div class="login">
      <img class="brand-logo" src="assets/blk-logo.svg" alt="BLK قهوة">
      <div class="login-card">
        <div class="brand-sub">Sign in to continue</div>
        <div class="field-group">
          <input type="email" id="email" placeholder="Email" autocomplete="username">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
          <button class="primary" id="login-btn">Sign in</button>
          <div class="msg err" id="login-msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <div class="topbar">
      <img class="logo-img" src="assets/blk-logo.svg" alt="BLK">
      <div class="right">
        <div class="who">
          <div class="email" id="who-email">—</div>
          <span class="badge" id="who-role">—</span>
        </div>
        <button class="linkbtn" id="logout-btn">Sign out</button>
      </div>
    </div>

    <div class="workspace">
      <aside class="sidebar">
        <div class="side-group">
          <div class="side-label">Tables</div>
          <nav class="side-list" id="side-tables">
            <button class="side-item active" data-view="job_applications"><span class="ico"></span>Job Applications</button>
          </nav>
        </div>
        <div class="side-group side-bottom">
          <div class="side-label">Account</div>
          <nav class="side-list">
            <button class="side-item" data-view="account"><span class="ico"></span>Change password</button>
          </nav>
        </div>
      </aside>

      <main class="main">
        <section class="view" id="view-job_applications">
          <div class="ja-head">
            <div>
              <div class="section-title">Table</div>
              <h2 class="ja-title">Job Applications</h2>
            </div>
            <div class="ja-count" id="ja-count">—</div>
          </div>

          <div class="seg tabs" id="ja-tabs">
            <button type="button" data-s="new" class="active">New <span class="tab-count" id="cnt-new"></span></button>
            <button type="button" data-s="approved">Approved <span class="tab-count" id="cnt-approved"></span></button>
            <button type="button" data-s="rejected">Rejected <span class="tab-count" id="cnt-rejected"></span></button>
          </div>

          <div class="toolbar">
            <input type="search" id="ja-search" placeholder="Search name, phone, area…">
            <div class="filter-wrap" id="filter-wrap">
              <button class="filter-btn" id="filter-btn" aria-label="Filters" title="Filters">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
              </button>
              <div class="filter-panel" id="filter-panel">
                <div class="fp-group">
                  <div class="fp-label">Country</div>
                  <div class="seg" id="fp-country">
                    <button type="button" data-c="" class="active">All</button>
                    <button type="button" data-c="962">JO</button>
                    <button type="button" data-c="961">LB</button>
                    <button type="button" data-c="963">SY</button>
                    <button type="button" data-c="964">IQ</button>
                  </div>
                </div>
                <div class="fp-group">
                  <div class="fp-label">Gender</div>
                  <div class="seg" id="fp-gender">
                    <button type="button" data-g="" class="active">All</button>
                    <button type="button" data-g="Female">Female</button>
                    <button type="button" data-g="Male">Male</button>
                  </div>
                </div>
                <div class="fp-group">
                  <div class="fp-label">City</div>
                  <select id="fp-city" class="fp-select">
                    <option value="">All</option>
                    <option value="Amman">Amman</option>
                    <option value="Zarqa">Zarqa</option>
                    <option value="Aqaba">Aqaba</option>
                    <option value="Irbid">Irbid</option>
                  </select>
                </div>
                <div class="fp-group">
                  <div class="fp-label">Age range</div>
                  <div class="fp-age">
                    <input type="number" id="fp-age-min" placeholder="Min" min="0" max="120" inputmode="numeric">
                    <span>–</span>
                    <input type="number" id="fp-age-max" placeholder="Max" min="0" max="120" inputmode="numeric">
                  </div>
                </div>
                <button type="button" class="fp-clear" id="fp-clear">Clear filters</button>
              </div>
            </div>
            <button class="linkbtn" id="ja-refresh">Refresh</button>
          </div>

          <div id="ja-bulk" class="ja-bulk" style="display:none;">
            <button class="btn-wa" id="send-all">Send WhatsApp to all unsent</button>
          </div>

          <div id="ja-list" class="ja-list"></div>
          <div id="ja-empty" class="empty" style="display:none;">
            <h2>No applications yet</h2>
            <p>Submissions from the public form will show up here.</p>
          </div>
        </section>

        <section class="view hidden" id="view-account">
          <div class="section-title">Account</div>
          <h2 class="ja-title" style="margin-bottom: 18px;">Change password</h2>
          <div class="card" style="margin-top: 0; max-width: 380px;">
            <div class="field-group">
              <input type="password" id="new-pw" placeholder="New password (min 8 characters)" autocomplete="new-password">
              <button class="primary" id="pw-btn">Update password</button>
              <div class="msg" id="pw-msg"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Application detail -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <!-- Approve → schedule interview -->
    <div class="modal-overlay" id="sched-modal">
      <div class="modal" style="max-width: 400px;">
        <button class="modal-close" id="sched-close" aria-label="Close">✕</button>
        <div class="m-name" id="sched-name">—</div>
        <div class="m-sub">Schedule the interview, then send the WhatsApp invite.</div>
        <label class="sched-label">Interview date &amp; time</label>
        <input type="datetime-local" id="sched-dt">
        <div class="m-actions" style="margin-top:16px;">
          <button class="btn-wa" id="sched-send">Approve &amp; schedule</button>
        </div>
        <div class="m-msg" id="sched-msg"></div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = "https://cisqemycewkqakyqmusw.supabase.co";
  var SUPABASE_KEY = "sb_publishable_8emQ7ArqAiFZw7b7x0MLMQ_JWEuIis-";
  var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var loginWrap = document.getElementById("login-wrap");
  var app = document.getElementById("app");

  function showApp(session) {
    loginWrap.style.display = "none";
    app.style.display = "flex";
    document.getElementById("who-email").textContent = session.user.email;
    loadRole(session.user.id);
    loadApps();
  }
  function showLogin() {
    app.style.display = "none";
    loginWrap.style.display = "flex";
  }

  function loadRole(userId) {
    db.from("profiles").select("role, full_name").eq("id", userId).single()
      .then(function (res) {
        var role = (res.data && res.data.role) || "reviewer";
        document.getElementById("who-role").textContent = role;
      });
  }

  // ---- Login ----
  var loginBtn = document.getElementById("login-btn");
  var loginMsg = document.getElementById("login-msg");
  function doLogin() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    if (!email || !password) { loginMsg.textContent = "Enter your email and password."; return; }
    loginBtn.disabled = true; loginMsg.textContent = "";
    db.auth.signInWithPassword({ email: email, password: password })
      .then(function (res) {
        loginBtn.disabled = false;
        if (res.error) { loginMsg.textContent = "Incorrect email or password."; return; }
        showApp(res.data.session);
      })
      .catch(function () { loginBtn.disabled = false; loginMsg.textContent = "Something went wrong. Try again."; });
  }
  loginBtn.addEventListener("click", doLogin);
  document.getElementById("password").addEventListener("keydown", function (e) {
    if (e.key === "Enter") doLogin();
  });

  // ---- Logout ----
  document.getElementById("logout-btn").addEventListener("click", function () {
    db.auth.signOut().then(showLogin);
  });

  // ---- Change password ----
  var pwBtn = document.getElementById("pw-btn");
  var pwMsg = document.getElementById("pw-msg");
  pwBtn.addEventListener("click", function () {
    var newPw = document.getElementById("new-pw").value;
    pwMsg.className = "msg";
    if (!newPw || newPw.length < 8) { pwMsg.className = "msg err"; pwMsg.textContent = "Password must be at least 8 characters."; return; }
    pwBtn.disabled = true; pwMsg.textContent = "";
    db.auth.updateUser({ password: newPw }).then(function (res) {
      pwBtn.disabled = false;
      if (res.error) { pwMsg.className = "msg err"; pwMsg.textContent = res.error.message; return; }
      pwMsg.className = "msg ok"; pwMsg.textContent = "Password updated.";
      document.getElementById("new-pw").value = "";
    });
  });

  // ---- Job Applications review ----
  var section = "new"; // active tab: new | approved | rejected

  var allApps = [];
  var signedCache = {};
  var currentApp = null;

  function getPhotoUrl(path) {
    if (!path) return Promise.resolve(null);
    if (signedCache[path]) return signedCache[path];
    signedCache[path] = db.storage.from("photos").createSignedUrl(path, 3600)
      .then(function (r) { return (r.data && r.data.signedUrl) || null; })
      .catch(function () { return null; });
    return signedCache[path];
  }
  function esc(s) {
    return (s == null ? "" : String(s)).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function fmtDate(iso) {
    var d = new Date(iso);
    return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function loadApps() {
    var listEl = document.getElementById("ja-list");
    listEl.innerHTML = '<div style="color:var(--muted);padding:24px;text-align:center;">Loading…</div>';
    db.from("job_applications").select("*").order("created_at", { ascending: false }).then(function (res) {
      if (res.error) {
        listEl.innerHTML = '<div style="color:#ff6b6b;padding:24px;text-align:center;">Could not load applications.</div>';
        return;
      }
      allApps = res.data || [];
      renderApps();
    });
  }

  var fGender = "";
  var fAgeMin = null;
  var fAgeMax = null;
  var fCountry = "";
  var fCity = "";

  var COUNTRIES = [
    { dial: "962", name: "Jordan", flag: "jo" },
    { dial: "961", name: "Lebanon", flag: "lb" },
    { dial: "963", name: "Syria", flag: "sy" },
    { dial: "964", name: "Iraq", flag: "iq" }
  ];
  function phoneCountry(phone) {
    if (!phone) return null;
    var p = String(phone).replace(/[^\d+]/g, "");
    for (var i = 0; i < COUNTRIES.length; i++) { if (p.indexOf("+" + COUNTRIES[i].dial) === 0) return COUNTRIES[i]; }
    return null;
  }

  function calcAge(dob) {
    if (!dob) return null;
    var d = new Date(dob);
    if (isNaN(d.getTime())) return null;
    var t = new Date();
    var age = t.getFullYear() - d.getFullYear();
    var m = t.getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && t.getDate() < d.getDate())) age--;
    return (age >= 0 && age < 130) ? age : null;
  }
  function ageFlag(age) { return (age != null && (age > 25 || age < 18)) ? " 🚩" : ""; }
  function ageText(dob) { var a = calcAge(dob); return a == null ? "—" : (a + " yrs" + ageFlag(a)); }

  function filterApps() {
    var q = (document.getElementById("ja-search").value || "").toLowerCase().trim();
    return allApps.filter(function (a) {
      if ((a.status || "new") !== section) return false;
      if (q) {
        var hay = ((a.full_name || "") + " " + (a.phone || "") + " " + (a.living_area || "")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      if (fGender && a.gender !== fGender) return false;
      if (fCountry) { var pc = phoneCountry(a.phone); if (!pc || pc.dial !== fCountry) return false; }
      if (fCity && a.city !== fCity) return false;
      if (fAgeMin != null || fAgeMax != null) {
        var age = calcAge(a.date_of_birth);
        if (age == null) return false;
        if (fAgeMin != null && age < fAgeMin) return false;
        if (fAgeMax != null && age > fAgeMax) return false;
      }
      return true;
    });
  }
  function sectionCounts() {
    var c = { new: 0, approved: 0, rejected: 0 };
    allApps.forEach(function (a) { var s = (a.status || "new"); if (c[s] != null) c[s]++; });
    return c;
  }
  function fmtInterview(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    try { return d.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" }) + " · " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
    catch (e) { return d.toLocaleString(); }
  }
  function setThumb(el, a) {
    if (!a.photo_path) return;
    getPhotoUrl(a.photo_path).then(function (url) {
      if (url) { el.style.background = "url(" + url + ") center/cover"; el.textContent = ""; }
    });
  }

  function renderApps() {
    var listEl = document.getElementById("ja-list");
    var emptyEl = document.getElementById("ja-empty");

    var counts = sectionCounts();
    document.getElementById("cnt-new").textContent = counts.new ? "(" + counts.new + ")" : "";
    document.getElementById("cnt-approved").textContent = counts.approved ? "(" + counts.approved + ")" : "";
    document.getElementById("cnt-rejected").textContent = counts.rejected ? "(" + counts.rejected + ")" : "";

    var rows = filterApps();
    document.getElementById("ja-count").textContent = rows.length + (rows.length === 1 ? " applicant" : " applicants");

    // "Send to all" bar: only in Approved, and only if someone still needs messaging
    var unsent = allApps.filter(function (a) { return a.status === "approved" && !a.message_sent; }).length;
    var bulk = document.getElementById("ja-bulk");
    if (section === "approved" && unsent > 0) {
      bulk.style.display = "block";
      document.getElementById("send-all").textContent = "Send WhatsApp to all unsent (" + unsent + ")";
    } else {
      bulk.style.display = "none";
    }

    if (!rows.length) {
      listEl.innerHTML = "";
      emptyEl.style.display = "block";
      emptyEl.innerHTML = "<h2>Nothing here</h2><p>No applicants in “" + section + "”.</p>";
      return;
    }
    emptyEl.style.display = "none";
    listEl.innerHTML = "";

    var grid = document.createElement("div");
    grid.className = "ja-cards";
    rows.forEach(function (a) {
      var initial = (a.full_name || "?").trim().charAt(0).toUpperCase();
      var age = calcAge(a.date_of_birth);

      var footer;
      if (section === "new") {
        footer = '<div class="card-actions"><button class="btn-approve">Approve</button><button class="btn-reject">Reject</button></div>';
      } else if (section === "approved") {
        footer =
          (a.interview_at ? '<div class="card-when">📅 ' + esc(fmtInterview(a.interview_at)) + "</div>" : "") +
          (a.message_sent ? '<div class="card-sent">✓ Message sent</div>' : "") +
          '<div class="card-actions"><button class="btn-send">' + (a.message_sent ? "Resend" : "Send WhatsApp") + '</button><button class="btn-reject">Reject</button></div>';
      } else {
        footer = '<div class="card-actions"><button class="btn-restore">Restore</button><button class="btn-del">Delete</button></div>';
      }

      var card = document.createElement("div");
      card.className = "ja-card";
      card.innerHTML =
        '<div class="photo">' + esc(initial) + "</div>" +
        '<div class="body"><div class="name">' + esc(a.full_name) + "</div>" +
        '<div class="meta">' + (function () { var c = phoneCountry(a.phone); return c ? ('<img class="mini-flag" src="https://flagcdn.com/' + esc(c.flag) + '.svg" alt=""> ' + esc(c.name) + ' · ') : ""; })() + (age == null ? esc(a.living_area || "—") : (age + " yrs" + ageFlag(age) + " · " + esc(a.living_area || "—"))) + "</div>" +
        footer + "</div>";
      card.addEventListener("click", function () { openDetail(a); });

      var approveBtn = card.querySelector(".btn-approve");
      if (approveBtn) approveBtn.addEventListener("click", function (e) { e.stopPropagation(); openSchedule(a); });
      var rejectBtn = card.querySelector(".btn-reject");
      if (rejectBtn) rejectBtn.addEventListener("click", function (e) { e.stopPropagation(); reject(a); });
      var sendBtn = card.querySelector(".btn-send");
      if (sendBtn) sendBtn.addEventListener("click", function (e) { e.stopPropagation(); sendWhatsApp(a); });
      var restoreBtn = card.querySelector(".btn-restore");
      if (restoreBtn) restoreBtn.addEventListener("click", function (e) { e.stopPropagation(); setStatus(a, "new"); });
      var delBtn = card.querySelector(".btn-del");
      if (delBtn) delBtn.addEventListener("click", function (e) { e.stopPropagation(); deletePermanent(a); });

      grid.appendChild(card);
      setThumb(card.querySelector(".photo"), a);
    });
    listEl.appendChild(grid);
  }

  function fieldHtml(k, v) {
    return '<div class="m-field"><div class="k">' + esc(k) + '</div><div class="v">' + esc(v || "—") + "</div></div>";
  }
  function openDetail(a) {
    currentApp = a;
    document.getElementById("modal-body").innerHTML =
      '<img class="m-photo" id="m-photo" alt="" style="display:none;">' +
      '<div class="m-name">' + esc(a.full_name) + "</div>" +
      '<div class="m-sub">Applied ' + fmtDate(a.created_at) + "</div>" +
      '<div class="m-grid">' +
        fieldHtml("Phone", a.phone) +
        fieldHtml("Age", ageText(a.date_of_birth) + (a.date_of_birth ? " · " + a.date_of_birth : "")) +
        fieldHtml("How found", a.how_found) +
        fieldHtml("City", a.city) +
        fieldHtml("Living area", a.living_area) +
        fieldHtml("Gender", a.gender) +
        fieldHtml("Full / Part", a.work_type) +
        fieldHtml("Currently working", a.currently_working) +
        fieldHtml("Education", a.education_level) +
        fieldHtml("Favorite drink", a.favorite_drink) +
        '<div class="m-field full"><div class="k">Why join</div><div class="v">' + esc(a.why_join || "—") + "</div></div>" +
      "</div>";

    document.getElementById("modal").classList.add("open");

    if (a.photo_path) getPhotoUrl(a.photo_path).then(function (url) {
      if (url) { var im = document.getElementById("m-photo"); im.src = url; im.style.display = "block"; }
    });
  }

  function closeModal() { document.getElementById("modal").classList.remove("open"); currentApp = null; }
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal").addEventListener("click", function (e) { if (e.target === this) closeModal(); });

  // ---- Approve (schedule interview + WhatsApp invite) & Reject (delete) ----
  var schedApp = null;
  var BLK_LOCATION = "https://maps.app.goo.gl/9ELvkFsNGtPF4qdE9";
  function interviewMessage(name, dateText, timeText) {
    return "هلا " + (name || "") + " 👋\n\n" +
      "شكراً على تقديمك لوظيفة عندنا في قهوة BLK.\n\n" +
      "حبينا نعزمك على مقابلة، وهذي التفاصيل:\n\n" +
      "📅 التاريخ: " + dateText + "\n" +
      "🕐 الوقت: " + timeText + "\n" +
      "📍 المكان: " + BLK_LOCATION + "\n\n" +
      "لا تنسى ترد علينا تأكد حضورك، وإذا في تعارض بالوقت قولنا نرتب لك وقت ثاني 🙌\n\n" +
      "بانتظارك ونتمنى نشوفك!\n\n" +
      "مع تحياتنا،\n" +
      "فريق التوظيف – قهوة BLK";
  }
  function openSchedule(a) {
    schedApp = a;
    document.getElementById("sched-name").textContent = a.full_name;
    document.getElementById("sched-dt").value = "";
    document.getElementById("sched-msg").textContent = "";
    document.getElementById("sched-modal").classList.add("open");
  }
  function closeSched() { document.getElementById("sched-modal").classList.remove("open"); schedApp = null; }
  document.getElementById("sched-close").addEventListener("click", closeSched);
  document.getElementById("sched-modal").addEventListener("click", function (e) { if (e.target === this) closeSched(); });
  document.getElementById("sched-send").addEventListener("click", function () {
    if (!schedApp) return;
    var dt = document.getElementById("sched-dt").value;
    var smsg = document.getElementById("sched-msg");
    if (!dt) { smsg.textContent = "Please choose the interview date & time."; return; }
    var iso = new Date(dt).toISOString();
    var appRef = schedApp;
    smsg.textContent = "Saving…";
    db.from("job_applications").update({ status: "approved", interview_at: iso, message_sent: false }).eq("id", appRef.id).then(function (res) {
      if (res.error) { smsg.textContent = "Could not save. Please try again."; return; }
      appRef.status = "approved"; appRef.interview_at = iso; appRef.message_sent = false;
      closeSched();
      renderApps();
    });
  });
  function setStatus(a, status) {
    db.from("job_applications").update({ status: status }).eq("id", a.id).then(function (res) {
      if (res.error) { alert("Could not update. Please try again."); return; }
      a.status = status;
      renderApps();
    });
  }
  function reject(a) { setStatus(a, "rejected"); }

  function waUrlFor(a) {
    var num = (a.phone || "").replace(/[^\d]/g, "");
    if (!num) return null;
    var dateText = "", timeText = "";
    if (a.interview_at) {
      var when = new Date(a.interview_at);
      if (!isNaN(when.getTime())) {
        try {
          dateText = when.toLocaleDateString("ar-u-nu-latn", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
          timeText = when.toLocaleTimeString("ar-u-nu-latn", { hour: "numeric", minute: "2-digit" });
        } catch (e) {
          dateText = when.toLocaleDateString();
          timeText = when.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }
      }
    }
    return "https://wa.me/" + num + "?text=" + encodeURIComponent(interviewMessage(a.full_name, dateText, timeText));
  }
  function markSent(ids) {
    db.from("job_applications").update({ message_sent: true }).in("id", ids).then(function () { renderApps(); });
  }
  function sendWhatsApp(a) {
    var url = waUrlFor(a);
    if (!url) { alert("No phone number on file for this applicant."); return; }
    var w = window.open(url, "_blank");
    if (w) { a.message_sent = true; markSent([a.id]); }
    else { alert("Your browser blocked the pop-up. Please allow pop-ups for this site."); }
  }
  function sendAll() {
    var pend = allApps.filter(function (a) { return a.status === "approved" && !a.message_sent; });
    if (!pend.length) { alert("Everyone in Approved has already been messaged."); return; }
    var openedIds = [];
    pend.forEach(function (a) {
      var url = waUrlFor(a);
      if (!url) return;
      var w = window.open(url, "_blank");
      if (w) { a.message_sent = true; openedIds.push(a.id); }
    });
    if (!openedIds.length) { alert("Your browser blocked the pop-ups. Please allow pop-ups for this site, or use each card's Send button."); return; }
    markSent(openedIds);
  }
  function deletePermanent(a) {
    if (!window.confirm("Permanently delete " + (a.full_name || "this applicant") + "? This removes their record and photo and cannot be undone.")) return;
    var removeRow = function () {
      db.from("job_applications").delete().eq("id", a.id).then(function (res) {
        if (res.error) { alert("Could not delete."); return; }
        allApps = allApps.filter(function (x) { return x.id !== a.id; });
        renderApps();
      });
    };
    if (a.photo_path) db.storage.from("photos").remove([a.photo_path]).then(removeRow, removeRow);
    else removeRow();
  }

  document.getElementById("ja-search").addEventListener("input", renderApps);
  document.getElementById("ja-refresh").addEventListener("click", loadApps);
  document.getElementById("send-all").addEventListener("click", sendAll);
  document.getElementById("ja-tabs").addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("button") : null;
    if (!b) return;
    section = b.getAttribute("data-s");
    var btns = this.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i] === b);
    renderApps();
  });

  // ---- Filter panel: gender + age range ----
  var filterBtn = document.getElementById("filter-btn");
  var filterPanel = document.getElementById("filter-panel");
  var filterWrap = document.getElementById("filter-wrap");
  function updateFilterActive() {
    filterBtn.classList.toggle("active", !!(fCountry || fCity || fGender || fAgeMin != null || fAgeMax != null));
  }
  filterBtn.addEventListener("click", function (e) { e.stopPropagation(); filterPanel.classList.toggle("open"); });
  document.addEventListener("click", function (e) { if (!filterWrap.contains(e.target)) filterPanel.classList.remove("open"); });

  document.getElementById("fp-gender").addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("button") : null;
    if (!b) return;
    fGender = b.getAttribute("data-g");
    var btns = this.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i] === b);
    updateFilterActive(); renderApps();
  });
  document.getElementById("fp-country").addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("button") : null;
    if (!b) return;
    fCountry = b.getAttribute("data-c");
    var btns = this.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i] === b);
    updateFilterActive(); renderApps();
  });
  function readAge(id) { var v = parseInt(document.getElementById(id).value, 10); return isNaN(v) ? null : v; }
  document.getElementById("fp-city").addEventListener("change", function () { fCity = this.value; updateFilterActive(); renderApps(); });
  document.getElementById("fp-age-min").addEventListener("input", function () { fAgeMin = readAge("fp-age-min"); updateFilterActive(); renderApps(); });
  document.getElementById("fp-age-max").addEventListener("input", function () { fAgeMax = readAge("fp-age-max"); updateFilterActive(); renderApps(); });
  document.getElementById("fp-clear").addEventListener("click", function () {
    fGender = ""; fAgeMin = null; fAgeMax = null; fCountry = ""; fCity = "";
    document.getElementById("fp-age-min").value = "";
    document.getElementById("fp-age-max").value = "";
    document.getElementById("fp-city").value = "";
    var gb = document.getElementById("fp-gender").querySelectorAll("button");
    for (var i = 0; i < gb.length; i++) gb[i].classList.toggle("active", gb[i].getAttribute("data-g") === "");
    var cb = document.getElementById("fp-country").querySelectorAll("button");
    for (var j = 0; j < cb.length; j++) cb[j].classList.toggle("active", cb[j].getAttribute("data-c") === "");
    updateFilterActive(); renderApps();
  });

  // ---- Sidebar: switch which table/view is open in the main pane ----
  function showView(id) {
    var views = document.querySelectorAll(".view");
    for (var i = 0; i < views.length; i++) views[i].classList.add("hidden");
    var v = document.getElementById("view-" + id);
    if (v) v.classList.remove("hidden");
    var items = document.querySelectorAll(".side-item");
    for (var j = 0; j < items.length; j++) {
      items[j].classList.toggle("active", items[j].getAttribute("data-view") === id);
    }
  }
  var sideItems = document.querySelectorAll(".side-item");
  for (var si = 0; si < sideItems.length; si++) {
    sideItems[si].addEventListener("click", function () { showView(this.getAttribute("data-view")); });
  }

  // ---- On load: restore session if present ----
  db.auth.getSession().then(function (res) {
    if (res.data && res.data.session) showApp(res.data.session);
    else showLogin();
  });
</script>
</body>
</html>
