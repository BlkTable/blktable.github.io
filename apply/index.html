<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application — طلب توظيف | BLK</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  :root {
    --bg: #0a0b0d;
    --bg-top: #16181c;
    --card: #131519;
    --text: #f2f3f5;
    --muted: #8b9198;
    --silver: #d6dade;
    --silver-hi: #eef0f2;
    --silver-lo: #b4b9c0;
    --line: rgba(255,255,255,0.08);
    --field-bg: #0e1013;
    --field-border: #2a2e34;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::placeholder { color: #5f656d; }
  .wrap {
    min-height: 100vh; padding: 32px 20px 60px;
    background: radial-gradient(1200px 600px at 50% -10%, var(--bg-top) 0%, var(--bg) 55%);
  }
  .sheet { width: 100%; max-width: 560px; margin: 0 auto; }
  .brand-logo { display: block; width: 210px; max-width: 70%; height: auto; margin: 8px auto 20px; }
  .head { text-align: center; margin-bottom: 26px; }
  .head h1 { font-size: 1.3rem; margin: 0 0 6px; font-weight: 800; letter-spacing: 0.02em; }
  .head p { margin: 0; color: var(--muted); font-size: 0.9rem; }
  .card {
    background: linear-gradient(180deg, #16181d 0%, var(--card) 100%);
    border: 1px solid var(--line); border-radius: 18px; padding: 24px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .field { margin-bottom: 16px; }
  .field:last-of-type { margin-bottom: 0; }
  label { display: block; font-size: 0.82rem; color: var(--text); margin-bottom: 7px; font-weight: 600; }
  label .req { color: var(--silver); }
  label .ar { color: var(--muted); font-weight: 400; }
  input, select, textarea {
    width: 100%; padding: 12px 14px; border-radius: 11px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 1rem; outline: none;
    font-family: inherit; transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--silver); box-shadow: 0 0 0 3px rgba(214,218,222,0.12); }
  textarea { resize: vertical; min-height: 88px; }
  select { appearance: none; -webkit-appearance: none; cursor: pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
  .phone-row { display: flex; gap: 10px; }
  .phone-row .cc { flex: 0 0 auto; width: auto; min-width: 116px; padding-right: 34px; font-size: 1rem; }
  .phone-row input { flex: 1; }
  .file-row { display: flex; align-items: center; gap: 12px; }
  .file-btn {
    padding: 11px 16px; border-radius: 11px; border: 1px solid var(--field-border);
    background: var(--field-bg); color: var(--text); font-size: 0.9rem; cursor: pointer; white-space: nowrap;
  }
  .file-btn:hover { border-color: var(--silver); }
  .file-name { color: var(--muted); font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  input[type="file"] { display: none; }
  .hint { color: var(--muted); font-size: 0.76rem; margin-top: 6px; }
  .submit {
    width: 100%; margin-top: 22px; padding: 14px 16px; border-radius: 12px; border: none;
    background: linear-gradient(180deg, var(--silver-hi) 0%, var(--silver-lo) 100%);
    color: #14161a; font-weight: 700; font-size: 1rem; cursor: pointer;
    transition: filter 0.15s ease, transform 0.05s ease;
  }
  .submit:hover { filter: brightness(1.05); }
  .submit:active { transform: translateY(1px); }
  .submit:disabled { opacity: 0.55; cursor: default; filter: none; }
  .form-msg { text-align: center; min-height: 1.2em; margin-top: 12px; font-size: 0.88rem; color: #ff6b6b; }
  .success { display: none; text-align: center; padding: 20px 10px; }
  .success .check {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 18px;
    border: 2px solid var(--silver); display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: var(--silver);
  }
  .success h2 { margin: 0 0 8px; font-size: 1.2rem; }
  .success p { margin: 0; color: var(--muted); font-size: 0.92rem; line-height: 1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sheet">
      <img class="brand-logo" src="../assets/blk-logo.svg" alt="BLK قهوة">
      <div class="head">
        <h1>Job Application <span style="color:var(--muted);font-weight:600;">· طلب توظيف</span></h1>
        <p>Fill in your details below and we'll be in touch.</p>
      </div>

      <div class="card" id="card">
        <form id="form" novalidate>
          <div class="field">
            <label for="full_name">Full name <span class="ar">/ الاسم الكامل</span> <span class="req">*</span></label>
            <input type="text" id="full_name" autocomplete="name" required>
          </div>
          <div class="field">
            <label for="phone_local">Phone number <span class="ar">/ رقم الهاتف</span> <span class="req">*</span></label>
            <div class="phone-row">
              <select id="cc" class="cc">
                <option value="962" data-len="9" data-ph="7X XXX XXXX" selected>🇯🇴 +962</option>
                <option value="961" data-len="7,8" data-ph="XX XXX XXX">🇱🇧 +961</option>
                <option value="963" data-len="9" data-ph="9XX XXX XXX">🇸🇾 +963</option>
              </select>
              <input type="tel" id="phone_local" inputmode="numeric" autocomplete="tel-national" required>
            </div>
            <div class="hint">We may contact you on WhatsApp.</div>
          </div>
          <div class="field">
            <label for="email">Email <span class="ar">/ البريد الإلكتروني</span></label>
            <input type="email" id="email" autocomplete="email">
          </div>
          <div class="field">
            <label for="dob">Date of birth <span class="ar">/ تاريخ الميلاد</span></label>
            <input type="date" id="dob">
          </div>
          <div class="field">
            <label for="city">City / area <span class="ar">/ المدينة</span></label>
            <input type="text" id="city">
          </div>
          <div class="field">
            <label for="branch">Preferred branch <span class="ar">/ الفرع المفضل</span></label>
            <input type="text" id="branch">
          </div>
          <div class="field">
            <label for="availability">Availability <span class="ar">/ الدوام</span></label>
            <select id="availability">
              <option value="">Select…</option>
              <option value="full_time">Full-time / دوام كامل</option>
              <option value="part_time">Part-time / دوام جزئي</option>
              <option value="either">Either / كلاهما</option>
            </select>
          </div>
          <div class="field">
            <label>A photo of yourself <span class="ar">/ صورة شخصية</span></label>
            <div class="file-row">
              <button type="button" class="file-btn" id="file-btn">Choose photo</button>
              <span class="file-name" id="file-name">No photo chosen</span>
            </div>
            <input type="file" id="photo" accept="image/*">
            <div class="hint">A clear photo of your face — up to 10 MB.</div>
          </div>
          <div class="field">
            <label for="message">Anything else? <span class="ar">/ ملاحظات</span></label>
            <textarea id="message" placeholder="A short note about yourself (optional)"></textarea>
          </div>

          <button type="submit" class="submit" id="submit-btn">Submit application</button>
          <div class="form-msg" id="form-msg"></div>
        </form>
      </div>

      <div class="card success" id="success">
        <div class="check">✓</div>
        <h2>Application received</h2>
        <p>Thank you for applying to BLK.<br>We've got your application and will reach out if there's a fit.</p>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = "https://cisqemycewkqakyqmusw.supabase.co";
  var SUPABASE_KEY = "sb_publishable_8emQ7ArqAiFZw7b7x0MLMQ_JWEuIis-";
  var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var MAX_BYTES = 10 * 1024 * 1024; // 10 MB
  var fileInput = document.getElementById("photo");
  var fileName = document.getElementById("file-name");

  document.getElementById("file-btn").addEventListener("click", function () { fileInput.click(); });
  fileInput.addEventListener("change", function () {
    fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "No photo chosen";
  });

  // ---- Phone: country code + digit-limited local number ----
  var ccSel = document.getElementById("cc");
  var phoneLocal = document.getElementById("phone_local");
  function ccOption() { return ccSel.options[ccSel.selectedIndex]; }
  function allowedLengths() {
    return ccOption().getAttribute("data-len").split(",").map(function (n) { return parseInt(n, 10); });
  }
  function applyCc() {
    var lens = allowedLengths();
    phoneLocal.placeholder = ccOption().getAttribute("data-ph");
    phoneLocal.maxLength = Math.max.apply(null, lens) + 1; // +1 tolerates a leading 0
  }
  ccSel.addEventListener("change", applyCc);
  phoneLocal.addEventListener("input", function () {
    phoneLocal.value = phoneLocal.value.replace(/\D/g, "");
  });
  applyCc();

  function val(id) { return document.getElementById(id).value.trim(); }
  function sanitize(name) { return name.replace(/[^a-zA-Z0-9._-]/g, "_").slice(-80); }

  document.getElementById("form").addEventListener("submit", function (e) {
    e.preventDefault();
    var msg = document.getElementById("form-msg");
    var btn = document.getElementById("submit-btn");
    msg.textContent = "";

    var fullName = val("full_name");
    if (!fullName) { msg.textContent = "Please enter your full name."; return; }

    // Assemble + validate phone: strip non-digits and any leading zero, then check length.
    var local = phoneLocal.value.replace(/\D/g, "").replace(/^0+/, "");
    var lens = allowedLengths();
    if (lens.indexOf(local.length) === -1) {
      msg.textContent = "Please enter a valid phone number for the selected country.";
      return;
    }
    var phone = "+" + ccOption().value + local;

    var file = fileInput.files[0] || null;
    if (file && file.size > MAX_BYTES) { msg.textContent = "That file is larger than 10 MB. Please choose a smaller one."; return; }

    btn.disabled = true;
    btn.textContent = "Submitting…";

    function uploadPhoto() {
      if (!file) return Promise.resolve(null);
      var path = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())) + "_" + sanitize(file.name);
      return db.storage.from("photos").upload(path, file, { upsert: false })
        .then(function (res) {
          if (res.error) throw res.error;
          return res.data.path;
        });
    }

    uploadPhoto()
      .then(function (photoPath) {
        return db.from("job_applications").insert({
          full_name: fullName,
          phone: phone,
          email: val("email") || null,
          date_of_birth: val("dob") || null,
          city: val("city") || null,
          preferred_branch: val("branch") || null,
          availability: val("availability") || null,
          message: val("message") || null,
          photo_path: photoPath
        });
      })
      .then(function (res) {
        if (res && res.error) throw res.error;
        document.getElementById("card").style.display = "none";
        document.getElementById("success").style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      })
      .catch(function (err) {
        btn.disabled = false;
        btn.textContent = "Submit application";
        msg.textContent = "Sorry, something went wrong submitting your application. Please try again.";
        if (window.console) console.error(err);
      });
  });
</script>
</body>
</html>
